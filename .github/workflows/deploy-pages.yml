name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npx ng build --base-href /maxsales/

      - name: Inject API URL
        if: vars.API_URL != ''
        working-directory: frontend/dist/maxsales/browser
        run: |
          sed -i "s|/\* CRM_API_URL \*/|window.CRM_API_URL='${{ vars.API_URL }}';|" index.html

      - name: SPA fallback for client-side routing
        working-directory: frontend/dist/maxsales/browser
        run: cp index.html 404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/maxsales/browser

      - id: deployment
        uses: actions/deploy-pages@v4
